<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#37474f"/>
    </marker>
    <style type="text/css"><![CDATA[
      .zh { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", SimHei, sans-serif; }
    ]]></style>
  </defs>

  <text class="zh" x="360" y="28" text-anchor="middle" font-size="15" fill="#1a237e" font-weight="bold">
    SafeEar 检测分支架构示意
  </text>

  <rect x="260" y="48" width="200" height="44" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
  <text class="zh" x="360" y="75" text-anchor="middle" font-size="12" fill="#0d47a1" font-weight="bold">输入语音波形</text>

  <line x1="360" y1="92" x2="360" y2="108" stroke="#37474f" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="120" y="108" width="480" height="72" rx="8" fill="#fff8e1" stroke="#f57c00" stroke-width="1.5"/>
  <text class="zh" x="360" y="132" text-anchor="middle" font-size="12" fill="#e65100" font-weight="bold">预训练语音分词器</text>
  <text class="zh" x="360" y="152" text-anchor="middle" font-size="10" fill="#5d4037">将波形编码为多层声学 Token（离散与连续混合表示）</text>
  <text class="zh" x="360" y="170" text-anchor="middle" font-size="10" fill="#5d4037">检测训练阶段通常冻结该模块参数</text>

  <line x1="360" y1="180" x2="360" y2="198" stroke="#37474f" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="100" y="198" width="520" height="168" rx="8" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text class="zh" x="360" y="222" text-anchor="middle" font-size="12" fill="#4a148c" font-weight="bold">检测主干网络</text>

  <rect x="130" y="234" width="200" height="52" rx="5" fill="#ede7f6" stroke="#6a1b9a" stroke-width="1"/>
  <text class="zh" x="230" y="256" text-anchor="middle" font-size="10.5" fill="#311b92" font-weight="bold">瓶颈层</text>
  <text class="zh" x="230" y="274" text-anchor="middle" font-size="9.5" fill="#4527a0">多层 Token 拼接后经一维卷积融合并降维</text>

  <rect x="360" y="234" width="120" height="52" rx="5" fill="#ede7f6" stroke="#6a1b9a" stroke-width="1"/>
  <text class="zh" x="420" y="256" text-anchor="middle" font-size="10.5" fill="#311b92" font-weight="bold">分段打乱</text>
  <text class="zh" x="420" y="274" text-anchor="middle" font-size="9" fill="#4527a0">训练时在固定帧段内随机打乱顺序</text>

  <rect x="500" y="228" width="100" height="64" rx="5" fill="#ede7f6" stroke="#6a1b9a" stroke-width="1"/>
  <text class="zh" x="550" y="252" text-anchor="middle" font-size="10.5" fill="#311b92" font-weight="bold">序列 Transformer</text>
  <text class="zh" x="550" y="268" text-anchor="middle" font-size="9" fill="#4527a0">分类头</text>
  <text class="zh" x="550" y="282" text-anchor="middle" font-size="8.5" fill="#4527a0">自注意力建模与序列聚合</text>

  <line x1="330" y1="260" x2="358" y2="260" stroke="#6a1b9a" stroke-width="1"/>
  <line x1="480" y1="260" x2="498" y2="260" stroke="#6a1b9a" stroke-width="1"/>

  <text class="zh" x="360" y="308" text-anchor="middle" font-size="9.5" fill="#4a148c">检测路径以声学 Token 序列为输入，经上述模块得到类别得分</text>

  <rect x="180" y="322" width="360" height="34" rx="6" fill="#e1bee7" stroke="#7b1fa2" stroke-width="1"/>
  <text class="zh" x="360" y="343" text-anchor="middle" font-size="10" fill="#4a148c">全连接层输出两类判别分数</text>

  <line x1="360" y1="366" x2="360" y2="382" stroke="#37474f" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="240" y="382" width="240" height="48" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.2"/>
  <text class="zh" x="360" y="404" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="bold">归一化得到真人 / 伪造概率</text>
  <text class="zh" x="360" y="422" text-anchor="middle" font-size="9.5" fill="#33691e">推理与评测时据此设定阈值或代价最优阈值</text>

  <text class="zh" x="360" y="478" text-anchor="middle" font-size="9.5" fill="#78909c">
    图示为伪造检测路径；不含内容保护等其它 SafeEar 功能
  </text>
</svg>
