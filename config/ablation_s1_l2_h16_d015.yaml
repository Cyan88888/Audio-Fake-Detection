# Stage-1 ablation: 2 layers + 16 heads + dropout 0.15.

datamodule:
  _target_: safeear.datas.asvspoof19.DataModule
  batch_size: 64
  num_workers: 8
  pin_memory: true
  DataClass_dict:
    _target_: safeear.datas.asvspoof19.DataClass
    train_path:
      - datas/ASVSpoof2019/train.tsv
      - datas/ASVSpoof2019/ASVspoof2019.LA.cm.train.trn.txt
      - datas/datasets/ASVSpoof2019_WavLM_base/LA/ASVspoof2019_LA_train/flac
    val_path:
      - datas/ASVSpoof2019/dev.tsv
      - datas/ASVSpoof2019/ASVspoof2019.LA.cm.dev.trl.txt
      - datas/datasets/ASVSpoof2019_WavLM_base/LA/ASVspoof2019_LA_dev/flac
    test_path:
      - datas/ASVSpoof2019/eval.tsv
      - datas/ASVSpoof2019/ASVspoof2019.LA.cm.eval.trl.txt
      - datas/datasets/ASVSpoof2019_WavLM_base/LA/ASVspoof2019_LA_eval/flac
    max_len: 64600

detect_model:
  _target_: safeear.models.detector_transformer.FrameTransformerDetector
  input_dim: 768
  embedding_dim: 768
  num_classes: 2
  num_layers: 2
  num_heads: 16
  mlp_ratio: 1.0
  dropout_rate: 0.15
  attention_dropout: 0.15
  stochastic_depth_rate: 0.15
  positional_embedding: sine
  sequence_length: 512

system:
  _target_: safeear.trainer.transformer_trainer.TransformerSpoofTrainer
  lr: 0.0003
  save_score_path: ${exp.dir}/${exp.name}
  threshold_mode: val_mindcf
  threshold_fixed_bonafide: 0.5
  p_target: 0.05
  use_min_tdcf: true
  tdcf_la_root: datas/datasets/ASVSpoof2019/LA
  tdcf_p_tar: 0.9405
  tdcf_p_non: 0.0095
  tdcf_p_spoof: 0.05
  tdcf_c_miss_asv: 1.0
  tdcf_c_fa_asv: 10.0
  tdcf_c_miss_cm: 1.0
  tdcf_c_fa_cm: 10.0
  warmup_epochs_ratio: 0.1
  weight_decay: 0.0001

exp:
  dir: Exps/
  name: Ablation_S1_l2_h16_d015

early_stopping:
  _target_: pytorch_lightning.callbacks.EarlyStopping
  monitor: val_eer
  mode: min
  patience: 8
  verbose: true

checkpoint:
  _target_: pytorch_lightning.callbacks.ModelCheckpoint
  dirpath: ${exp.dir}/${exp.name}/checkpoints
  monitor: val_eer
  mode: min
  verbose: true
  save_top_k: 1
  save_last: true
  filename: '{epoch}-{val_eer:.4f}'

logger:
  _target_: pytorch_lightning.loggers.CSVLogger
  save_dir: ${exp.dir}/${exp.name}
  name: csv_logs

trainer:
  _target_: pytorch_lightning.Trainer
  devices:
    - 0
  max_epochs: 30
  sync_batchnorm: true
  default_root_dir: ${exp.dir}/${exp.name}/
  accelerator: gpu
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  fast_dev_run: false
