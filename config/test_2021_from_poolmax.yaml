# Cross-dataset evaluation on ASVspoof2021 LA eval
# using checkpoint from Ablation_Pool_max.

datamodule:
  _target_: safeear.datas.asvspoof21.DataModule
  batch_size: 64
  num_workers: 8
  pin_memory: true
  DataClass_dict:
    _target_: safeear.datas.asvspoof21.DataClass
    # test.py instantiates all splits in setup(); point all paths to eval for pure inference workflow
    train_path:
      - datas/ASVSpoof2021/eval.tsv
      - datas/ASVSpoof2021/ASVspoof2021.LA.cm.eval.trl.txt
      - datas/datasets/ASVSpoof2021_WavLM_base/ASVspoof2021_LA_eval
    val_path:
      - datas/ASVSpoof2021/eval.tsv
      - datas/ASVSpoof2021/ASVspoof2021.LA.cm.eval.trl.txt
      - datas/datasets/ASVSpoof2021_WavLM_base/ASVspoof2021_LA_eval
    test_path:
      - datas/ASVSpoof2021/eval.tsv
      - datas/ASVSpoof2021/ASVspoof2021.LA.cm.eval.trl.txt
      - datas/datasets/ASVSpoof2021_WavLM_base/ASVspoof2021_LA_eval
    max_len: 64600

detect_model:
  _target_: safeear.models.detector_transformer.FrameTransformerDetector
  input_dim: 768
  embedding_dim: 768
  num_classes: 2
  num_layers: 2
  num_heads: 16
  mlp_ratio: 1.0
  dropout_rate: 0.15
  attention_dropout: 0.15
  stochastic_depth_rate: 0.15
  pooling: max
  positional_embedding: learnable
  sequence_length: 512

system:
  _target_: safeear.trainer.transformer_trainer.TransformerSpoofTrainer
  lr: 0.0003
  save_score_path: ${exp.dir}/${exp.name}
  threshold_mode: val_mindcf
  threshold_fixed_bonafide: 0.5
  p_target: 0.05
  # Disable min-tDCF here: current implementation is tied to ASVspoof2019 LA ASV score files.
  use_min_tdcf: false
  warmup_epochs_ratio: 0.1
  weight_decay: 0.0001

exp:
  dir: Exps/
  name: Cross2021_from_PoolMax

early_stopping:
  _target_: pytorch_lightning.callbacks.EarlyStopping
  monitor: val_eer
  mode: min
  patience: 8
  verbose: true

checkpoint:
  _target_: pytorch_lightning.callbacks.ModelCheckpoint
  dirpath: ${exp.dir}/${exp.name}/checkpoints
  monitor: val_eer
  mode: min
  verbose: true
  save_top_k: 1
  save_last: true
  filename: '{epoch}-{val_eer:.4f}'

logger:
  _target_: pytorch_lightning.loggers.CSVLogger
  save_dir: ${exp.dir}/${exp.name}
  name: csv_logs

trainer:
  _target_: pytorch_lightning.Trainer
  devices:
    - 0
  max_epochs: 1
  sync_batchnorm: true
  default_root_dir: ${exp.dir}/${exp.name}/
  accelerator: gpu
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  fast_dev_run: false
